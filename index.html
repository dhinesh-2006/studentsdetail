<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }
        form{
            display:inline-block;
            border:2px solid gray;
            padding: 50px;
            margin-bottom: 20px;
        }
        table{
            border-collapse:collapse;
            margin:auto;
        }
        td,th{
            border-collapse:1px solid black;
            padding:10px;
        }
        input,select{
            width: 100%;
            padding:10px;
        }
        .saveBtn{
            width: 100%;
            background-color: lightgreen;
            padding: 8px;
            font-size: 18px;
            cursor:pointer;
        }
        .deleteBtn{
            background:red;
            color:white;
            border:none;
            padding:5px 10px;
            cursor:pointer;
        }
        .photo{ 
            width: 50px;
            height: 50px;
            align-content: center;
        }
        
        
    </style>
</head>
<body>
    <img src="dhinesh dp.jpeg" class="photo">
    <center>
    <h1>Student Form</h1>
    <form id="studentForm">
        <table >
            <tr><td>Name</td><td><input id="name"></td></tr>
            <tr><td>Age</td><td><input type="number" id="age"></td></tr>
            <tr><td>Gender </td>
            <td ><input type="radio" name="gender" value="Male" >male
                <input type="radio" name="gender" value="female">Female</td></tr>
        <tr><td>course</td>
        <td>
            <select id="course">
                <option>java</option>
                <option>javascript</option>
                <option>Html</option>
                <option>Python</option>
                <option>C++/C</option>
                <option>VLSI</option>
            </select>
        </td></tr>
        <tr><td>E-mail</td><td><input type="email" id="email"></td></tr>
        <tr><td colspan="2"><button class="saveBtn" type="submit">Save</button></td></tr>
        </table>
    </form>
    <br>
    <br>
        <table  id="studentTable">
            <tr>
            <th> Name </th>
            <th>age</th>
            <th>Course</th>
            <th>gender</th>
            <th>Email</th>
            <th>action</th></tr>
        </table>
    </center>
<script>
    let form=document.getElementById("studentForm")
    let table=document.getElementById("studentTable")
    form.addEventListener("submit",function(event)
{
    event.preventDefault()
    let name=document.getElementById("name")
    let age=document.getElementById("age")
    let course=document.getElementById("course")
    let email=document.getElementById("email")
    let gender=document.querySelector('input[name="gender"]:checked')

    let row=table.insertRow()
    row.innerHTML="<td>"+name.value+"</td>"+
    "<td>"+age.value+"</td>"+
    "<td>"+course.value+"</td>"+
    "<td>"+gender.value+"</td>"+
    "<td>"+email.value+"</td>"+
    "<td><button class='deleteBtn'>Delete</button></td>"
    row.querySelector(".deleteBtn").onclick=function(){
        row.remove()
    }
    form.reset()
})
</script>    
</body>
</html>
